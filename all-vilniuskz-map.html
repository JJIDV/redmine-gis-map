<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Projektų geometrija pagal įmones</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/proj4@2.9.1/dist/proj4.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    #map {
      flex: 1;
      min-width: 0;
    }

    #sidebar {
      flex: 0 0 260px;
      max-width: 260px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      font-size: 12px;
      background: #fff;
    }

    #sidebar-header {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      font-weight: 600;
      font-size: 12px;
      text-align: center;
    }

    #filter {
      padding: 6px 8px;
      border: none;
      border-bottom: 1px solid #ddd;
      outline: none;
      font-size: 12px;
      box-sizing: border-box;
      width: 100%;
    }

    #status-filter-wrap {
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      padding: 8px;
    }

    #status-filter-title {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 12px;
    }

    #status-filter-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .status-filter-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .status-filter-row input {
      margin: 0;
    }

    .status-filter-count {
      color: #777;
      font-size: 11px;
      margin-left: auto;
    }

    .status-filter-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .status-filter-actions button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 11px;
      cursor: pointer;
    }

    .status-filter-actions button:hover {
      background: #f0f8ff;
    }

    #list {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
    }

    .feature-row {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .feature-row:hover {
      background: #f0f8ff;
    }

    .feature-row.active {
      background: #e6f2ff;
    }

    .row-title {
      font-weight: 600;
      margin-bottom: 2px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-sub,
    .row-env,
    .row-status,
    .row-type {
      color: #555;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-sizing: border-box;
    }

    .company-dot {
      border: 2px solid currentColor;
      background: transparent;
    }

    #status-bar {
      padding: 4px 6px;
      border-top: 1px solid #ddd;
      font-size: 10px;
      color: #555;
      background: #fafafa;
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }

    .overlap-select-item {
      padding: 6px 4px;
      cursor: pointer;
      border-top: 1px solid #eee;
    }

    .overlap-select-item:hover {
      background: #f0f8ff;
    }

    @media (max-width: 600px) {
      #sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>

    <div id="sidebar">
      <div id="sidebar-header">Projektai pagal įmones</div>

      <input
        id="filter"
        type="text"
        placeholder="Filtruoti pagal ID / įmonę / statusą..."
      />

      <div id="status-filter-wrap">
        <div id="status-filter-title">Filtruoti pagal statusą</div>
        <div id="status-filter-list">Kraunama...</div>
      </div>

      <div id="list"></div>
      <div id="status-bar">Kraunama...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const arcgisLayerUrl =
      "https://opencity.idvilnius.lt/atviras/rest/services/Eismo_valdymas/EOP_uzduociu_geometrija/FeatureServer/3";

    const ENVIRONMENT_FIELD = "Aplinka";
    const ENVIRONMENT_VALUE = 1;

    const STATUS_FIELD = "Statusas";
    const COMPANY_FIELD = "Imone";

    /*
      Statusas = 0 / Sukurta EOP:
      - nekraunamas į žemėlapį;
      - nerodomas sąraše;
      - nerodomas statusų filtro parinktyse.
    */
    const EXCLUDED_STATUS_CODES = ["0"];

    const STATUS_DOMAIN = [
      { name: "Vykdoma", code: "1" },
      { name: "Atlikta UVS", code: "4" },
      { name: "Atšaukta UVS", code: "5" },
      { name: "Sukurta UVS", code: "6" },
      { name: "Atšaukta EOP", code: "7" },
      { name: "Patvirtinta ir uždaryta", code: "2" }
    ];

    /*
      Pagal nutylėjimą rodomi:
      1 - Vykdoma
      4 - Atlikta UVS
      5 - Atšaukta UVS
      6 - Sukurta UVS
    */
    const DEFAULT_VISIBLE_STATUSES = ["1", "4", "5", "6"];

    const statusLookup = STATUS_DOMAIN.reduce(function (acc, item) {
      acc[String(item.code)] = item.name;
      return acc;
    }, {});

    /*
      Poligono / taško užpildo spalva pagal Statusas.
    */
    const statusFillColors = {
      "1": "#f59e0b", // Vykdoma - oranžinė
      "2": "#166534", // Patvirtinta ir uždaryta - tamsesnė žalia
      "4": "#86efac", // Atlikta UVS - šviesiai žalia
      "5": "#dc2626", // Atšaukta UVS - raudona
      "6": "#facc15", // Sukurta UVS - geltona
      "7": "#dc2626"  // Atšaukta EOP - raudona
    };

    const companyLookup = {
      0: "Nenurodyta",
      1: "VMSA",
      2: "SISP",
      3: "VVT",
      4: "Grinda",
      5: "Biseris",
      6: "Maniga",
      7: "Gatas"
    };

    /*
      Poligono kraštinės / linijos / taško apvado spalva pagal Imone.
    */
    const companyStrokeColors = {
      0: "#6b7280", // Nenurodyta
      1: "#1f78b4", // VMSA
      2: "#33a02c", // SISP
      3: "#e31a1c", // VVT
      4: "#ff7f00", // Grinda
      5: "#6a3d9a", // Biseris
      6: "#b15928", // Maniga
      7: "#17a2b8"  // Gatas
    };

    const environmentLookup = {
      1: "Testinė",
      2: "Produkcinė"
    };

    proj4.defs(
      "EPSG:3346",
      "+proj=tmerc +lat_0=0 +lon_0=24 +k=0.9998 +x_0=500000 +y_0=0 +ellps=GRS80 +units=m +no_defs"
    );

    function lksToWgs(x, y) {
      const result = proj4("EPSG:3346", "EPSG:4326", [x, y]);
      return [result[1], result[0]];
    }

    function normalizeStatusValue(value) {
      if (value === null || value === undefined || value === "") {
        return "__EMPTY__";
      }
      return String(value);
    }

    function isExcludedStatus(statusKey) {
      return EXCLUDED_STATUS_CODES.includes(String(statusKey));
    }

    function getStatusText(value) {
      const key = normalizeStatusValue(value);

      if (key === "__EMPTY__") {
        return "Nenurodytas statusas";
      }

      return statusLookup[key] || ("Nežinomas statusas (" + key + ")");
    }

    function getStatusFillColor(statusValue) {
      const key = normalizeStatusValue(statusValue);
      return statusFillColors[key] || "#d1d5db";
    }

    function getCompanyText(code) {
      if (code === null || code === undefined || code === "") {
        return "Nenurodyta";
      }

      return companyLookup[code] || ("Įmonės kodas: " + code);
    }

    function getEnvironmentText(code) {
      return environmentLookup[code] || ("Aplinkos kodas: " + code);
    }

    function getCompanyStrokeColor(code) {
      if (code === null || code === undefined || code === "") {
        return companyStrokeColors[0];
      }

      return companyStrokeColors[code] || "#374151";
    }

    function getGeometryTypeLabel(geometry) {
      if (!geometry) return "Nėra geometrijos";
      if (Array.isArray(geometry.rings)) return "Poligonas";
      if (Array.isArray(geometry.paths)) return "Linija";
      if (typeof geometry.x === "number" && typeof geometry.y === "number") return "Taškas";
      return "Nežinoma geometrija";
    }

    function polygonToLatLngs(geometry) {
      if (!geometry || !Array.isArray(geometry.rings) || !geometry.rings.length) {
        return [];
      }

      return geometry.rings
        .map(function (ring) {
          return ring
            .filter(function (pt) {
              return Array.isArray(pt) && pt.length >= 2;
            })
            .map(function (pt) {
              return lksToWgs(pt[0], pt[1]);
            });
        })
        .filter(function (ring) {
          return ring.length;
        });
    }

    function polylineToLatLngs(geometry) {
      if (!geometry || !Array.isArray(geometry.paths) || !geometry.paths.length) {
        return [];
      }

      return geometry.paths
        .map(function (path) {
          return path
            .filter(function (pt) {
              return Array.isArray(pt) && pt.length >= 2;
            })
            .map(function (pt) {
              return lksToWgs(pt[0], pt[1]);
            });
        })
        .filter(function (path) {
          return path.length;
        });
    }

    function pointToLatLng(geometry) {
      if (!geometry || typeof geometry.x !== "number" || typeof geometry.y !== "number") {
        return null;
      }

      return lksToWgs(geometry.x, geometry.y);
    }

    function getGeometryCenter(geometry) {
      if (!geometry) return null;

      try {
        if (Array.isArray(geometry.rings) && geometry.rings.length) {
          const latLngs = polygonToLatLngs(geometry);
          if (!latLngs.length) return null;

          const polygon = L.polygon(latLngs);
          const bounds = polygon.getBounds();

          return bounds.isValid() ? bounds.getCenter() : null;
        }

        if (Array.isArray(geometry.paths) && geometry.paths.length) {
          const latLngs = polylineToLatLngs(geometry);
          if (!latLngs.length) return null;

          const polyline = L.polyline(latLngs);
          const bounds = polyline.getBounds();

          return bounds.isValid() ? bounds.getCenter() : null;
        }

        if (typeof geometry.x === "number" && typeof geometry.y === "number") {
          const pt = pointToLatLng(geometry);
          return pt ? L.latLng(pt[0], pt[1]) : null;
        }
      } catch (err) {
        console.error("Klaida skaičiuojant geometrijos centrą:", err, geometry);
      }

      return null;
    }

    function createLeafletLayer(geometry, companyCode, statusValue) {
      const strokeColor = getCompanyStrokeColor(companyCode);
      const fillColor = getStatusFillColor(statusValue);

      if (!geometry) return null;

      try {
        if (Array.isArray(geometry.rings) && geometry.rings.length) {
          const latLngs = polygonToLatLngs(geometry);
          if (!latLngs.length) return null;

          return L.polygon(latLngs, {
            color: strokeColor,
            weight: 3,
            opacity: 1,
            fillColor: fillColor,
            fillOpacity: 0.45,
            interactive: false
          });
        }

        if (Array.isArray(geometry.paths) && geometry.paths.length) {
          const latLngs = polylineToLatLngs(geometry);
          if (!latLngs.length) return null;

          return L.polyline(latLngs, {
            color: strokeColor,
            weight: 4,
            opacity: 0.95,
            interactive: false
          });
        }

        if (typeof geometry.x === "number" && typeof geometry.y === "number") {
          const latLng = pointToLatLng(geometry);
          if (!latLng) return null;

          return L.circleMarker(latLng, {
            radius: 7,
            color: strokeColor,
            weight: 3,
            fillColor: fillColor,
            fillOpacity: 0.9,
            interactive: false
          });
        }
      } catch (err) {
        console.error("Klaida kuriant Leaflet sluoksnį:", err, geometry);
      }

      return null;
    }

    const map = L.map("map").setView([54.6872, 25.2797], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap"
    }).addTo(map);

    const listEl = document.getElementById("list");
    const filterInput = document.getElementById("filter");
    const statusFilterList = document.getElementById("status-filter-list");
    const statusBar = document.getElementById("status-bar");

    let allItems = [];
    let featureLayer = L.featureGroup().addTo(map);
    let selectedStatuses = new Set(DEFAULT_VISIBLE_STATUSES);

    /*
      Svarbu:
      serverio pusėje filtruojame tik Aplinka = 1.
      Statusas = 0 išmetamas JS pusėje, nes ArcGIS servisas grąžino klaidą su Statusas <> 0.
    */
    function createQueryUrl() {
      const params = new URLSearchParams({
        where: ENVIRONMENT_FIELD + " = " + ENVIRONMENT_VALUE,
        outFields: "*",
        returnGeometry: "true",
        f: "json"
      });

      const url = arcgisLayerUrl + "/query?" + params.toString();
      console.log("Query URL:", url);

      return url;
    }

    function clearActiveRows() {
      document
        .querySelectorAll(".feature-row.active")
        .forEach(function (el) {
          el.classList.remove("active");
        });
    }

    function renderList(items) {
      listEl.innerHTML = "";

      items.forEach(function (item) {
        listEl.appendChild(item.rowEl);
      });

      statusBar.textContent =
        "Rodomi " + items.length + " objektai iš testinės aplinkos";
    }

    function getVisibleItems() {
      const q = filterInput.value.trim().toLowerCase();

      return allItems.filter(function (item) {
        if (isExcludedStatus(item.statusKey)) return false;
        if (!selectedStatuses.has(item.statusKey)) return false;

        if (!q) return true;

        return (item.searchText || "").toLowerCase().includes(q);
      });
    }

    function applyFilter() {
      featureLayer.clearLayers();

      const visibleItems = getVisibleItems();

      visibleItems.forEach(function (item) {
        item.layer.addTo(featureLayer);
      });

      renderList(visibleItems);
    }

    function buildStatusFilters() {
      const counts = {};
      const keys = [];

      allItems.forEach(function (item) {
        if (isExcludedStatus(item.statusKey)) return;

        if (!counts[item.statusKey]) {
          counts[item.statusKey] = 0;
          keys.push(item.statusKey);
        }

        counts[item.statusKey]++;
      });

      keys.sort(function (a, b) {
        const orderA = STATUS_DOMAIN.findIndex(function (s) {
          return String(s.code) === String(a);
        });

        const orderB = STATUS_DOMAIN.findIndex(function (s) {
          return String(s.code) === String(b);
        });

        if (orderA === -1 && orderB === -1) {
          return String(a).localeCompare(String(b), "lt");
        }

        if (orderA === -1) return 1;
        if (orderB === -1) return -1;

        return orderA - orderB;
      });

      if (!keys.length) {
        statusFilterList.textContent = "Statusų nerasta";
        return;
      }

      statusFilterList.innerHTML = "";

      keys.forEach(function (key) {
        const label = document.createElement("label");
        label.className = "status-filter-row";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.value = key;
        input.checked = selectedStatuses.has(key);

        input.addEventListener("change", function () {
          if (input.checked) {
            selectedStatuses.add(key);
          } else {
            selectedStatuses.delete(key);
          }

          applyFilter();
        });

        const statusDot = document.createElement("span");
        statusDot.className = "legend-dot";
        statusDot.style.background = getStatusFillColor(key);

        const text = document.createElement("span");
        text.textContent = getStatusText(key === "__EMPTY__" ? null : key);

        const count = document.createElement("span");
        count.className = "status-filter-count";
        count.textContent = counts[key];

        label.appendChild(input);
        label.appendChild(statusDot);
        label.appendChild(text);
        label.appendChild(count);

        statusFilterList.appendChild(label);
      });

      const actions = document.createElement("div");
      actions.className = "status-filter-actions";

      const defaultBtn = document.createElement("button");
      defaultBtn.type = "button";
      defaultBtn.textContent = "Numatytieji";

      defaultBtn.addEventListener("click", function () {
        selectedStatuses = new Set(DEFAULT_VISIBLE_STATUSES);
        buildStatusFilters();
        applyFilter();
      });

      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.textContent = "Visi";

      allBtn.addEventListener("click", function () {
        selectedStatuses = new Set(keys);
        buildStatusFilters();
        applyFilter();
      });

      const noneBtn = document.createElement("button");
      noneBtn.type = "button";
      noneBtn.textContent = "Nė vieno";

      noneBtn.addEventListener("click", function () {
        selectedStatuses = new Set();
        buildStatusFilters();
        applyFilter();
      });

      actions.appendChild(defaultBtn);
      actions.appendChild(allBtn);
      actions.appendChild(noneBtn);

      statusFilterList.appendChild(actions);
    }

    function pointInPolygon(point, polygonPoints) {
      let inside = false;

      for (let i = 0, j = polygonPoints.length - 1; i < polygonPoints.length; j = i++) {
        const xi = polygonPoints[i].x;
        const yi = polygonPoints[i].y;
        const xj = polygonPoints[j].x;
        const yj = polygonPoints[j].y;

        const intersect =
          yi > point.y !== yj > point.y &&
          point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi;

        if (intersect) inside = !inside;
      }

      return inside;
    }

    function distanceToSegment(p, a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;

      if (dx === 0 && dy === 0) {
        return p.distanceTo(a);
      }

      const t = Math.max(
        0,
        Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy))
      );

      const projected = L.point(a.x + t * dx, a.y + t * dy);

      return p.distanceTo(projected);
    }

    function itemContainsClick(item, latlng) {
      const geom = item.geometry;
      if (!geom) return false;

      const clickPoint = map.latLngToLayerPoint(latlng);

      if (Array.isArray(geom.rings)) {
        const rings = polygonToLatLngs(geom);

        return rings.some(function (ring) {
          const points = ring.map(function (ll) {
            return map.latLngToLayerPoint(L.latLng(ll[0], ll[1]));
          });

          return pointInPolygon(clickPoint, points);
        });
      }

      if (Array.isArray(geom.paths)) {
        const paths = polylineToLatLngs(geom);
        const tolerance = 8;

        return paths.some(function (path) {
          const points = path.map(function (ll) {
            return map.latLngToLayerPoint(L.latLng(ll[0], ll[1]));
          });

          for (let i = 1; i < points.length; i++) {
            if (distanceToSegment(clickPoint, points[i - 1], points[i]) <= tolerance) {
              return true;
            }
          }

          return false;
        });
      }

      if (typeof geom.x === "number" && typeof geom.y === "number") {
        const pt = pointToLatLng(geom);
        if (!pt) return false;

        const markerPoint = map.latLngToLayerPoint(L.latLng(pt[0], pt[1]));

        return clickPoint.distanceTo(markerPoint) <= 10;
      }

      return false;
    }

    function selectItem(item, latlng) {
      clearActiveRows();

      if (item.rowEl) {
        item.rowEl.classList.add("active");
        item.rowEl.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      const popupHtml = `
        <b>Objektas #${item.objectId}</b><br/>
        Įmonė: ${item.companyText}<br/>
        Aplinka: ${item.environmentText}<br/>
        Statusas: ${item.statusText}<br/>
        Geometrija: ${item.geometryTypeText}
      `;

      L.popup()
        .setLatLng(latlng || item.center)
        .setContent(popupHtml)
        .openOn(map);
    }

    function showMultiSelectPopup(items, latlng) {
      const html = `
        <div style="min-width:210px">
          <b>Pasirinkite objektą:</b>
          ${items
            .map(function (item, index) {
              return `
                <div class="overlap-select-item" data-index="${index}">
                  <b>Objektas #${item.objectId}</b><br/>
                  <span>
                    <span
                      class="legend-dot company-dot"
                      style="color:${getCompanyStrokeColor(item.companyCode)};"
                    ></span>
                    ${item.companyText}
                  </span><br/>
                  <span>
                    <span
                      class="legend-dot"
                      style="background:${getStatusFillColor(item.statusValue)};"
                    ></span>
                    <small>${item.statusText} · ${item.geometryTypeText}</small>
                  </span>
                </div>
              `;
            })
            .join("")}
        </div>
      `;

      const popup = L.popup()
        .setLatLng(latlng)
        .setContent(html)
        .openOn(map);

      setTimeout(function () {
        document.querySelectorAll(".overlap-select-item").forEach(function (el) {
          el.addEventListener("click", function () {
            const index = Number(el.getAttribute("data-index"));
            const item = items[index];

            map.closePopup(popup);
            selectItem(item, latlng);
          });
        });
      }, 0);
    }

    map.on("click", function (e) {
      const visibleItems = getVisibleItems();

      const hits = visibleItems.filter(function (item) {
        return itemContainsClick(item, e.latlng);
      });

      if (!hits.length) return;

      if (hits.length === 1) {
        selectItem(hits[0], e.latlng);
        return;
      }

      showMultiSelectPopup(hits, e.latlng);
    });

    async function loadData() {
      try {
        statusBar.textContent = "Kraunami duomenys...";
        featureLayer.clearLayers();
        allItems = [];
        listEl.innerHTML = "";
        statusFilterList.textContent = "Kraunama...";

        const url = createQueryUrl();

        const resp = await fetch(url, {
          cache: "no-store",
          mode: "cors"
        });

        const data = await resp.json();

        console.log("Pilnas query atsakymas:", data);
        console.log("Features kiekis:", data.features && data.features.length);

        if (data.error) {
          console.error("ArcGIS error:", data.error);

          statusBar.textContent =
            "Serverio klaida: " +
            (data.error.message || "nežinoma") +
            (data.error.details && data.error.details.length
              ? " | " + data.error.details.join(" | ")
              : "");

          return;
        }

        if (!data.features || !data.features.length) {
          console.warn("Servisas negrąžino features");

          statusBar.textContent = "Nerasta testinės aplinkos objektų";
          statusFilterList.textContent = "Statusų nerasta";

          return;
        }

        let skippedNoGeometry = 0;
        let skippedNoLayer = 0;
        let skippedNoCenter = 0;
        let skippedExcludedStatus = 0;
        let addedCount = 0;

        data.features.forEach(function (f) {
          const attrs = f.attributes || {};
          const geom = f.geometry;

          const statusValue = attrs[STATUS_FIELD];
          const statusKey = normalizeStatusValue(statusValue);

          if (isExcludedStatus(statusKey)) {
            skippedExcludedStatus++;
            return;
          }

          if (!geom) {
            skippedNoGeometry++;
            console.warn("Praleista: nėra geometrijos", f);
            return;
          }

          const objectId = attrs.OBJECTID !== undefined && attrs.OBJECTID !== null
            ? attrs.OBJECTID
            : "(be ID)";

          const companyCode = attrs[COMPANY_FIELD];
          const environmentCode = attrs[ENVIRONMENT_FIELD];

          const companyText = getCompanyText(companyCode);
          const environmentText = getEnvironmentText(environmentCode);
          const statusText = getStatusText(statusValue);
          const geometryTypeText = getGeometryTypeLabel(geom);

          const layer = createLeafletLayer(geom, companyCode, statusValue);

          if (!layer) {
            skippedNoLayer++;

            console.warn("Praleista: nepavyko sukurti Leaflet sluoksnio", {
              objectId: objectId,
              geometry: geom
            });

            return;
          }

          const center = getGeometryCenter(geom);

          if (!center) {
            skippedNoCenter++;

            console.warn("Praleista: nepavyko apskaičiuoti centro", {
              objectId: objectId,
              geometry: geom
            });

            return;
          }

          const row = document.createElement("div");
          row.className = "feature-row";
          row.innerHTML = `
            <div class="row-title">Objektas #${objectId}</div>

            <div class="row-sub">
              <span
                class="legend-dot company-dot"
                style="color:${getCompanyStrokeColor(companyCode)};"
              ></span>
              ${companyText}
            </div>

            <div class="row-env">Aplinka: ${environmentText}</div>

            <div class="row-status">
              <span
                class="legend-dot"
                style="background:${getStatusFillColor(statusValue)};"
              ></span>
              Statusas: ${statusText}
            </div>

            <div class="row-type">${geometryTypeText}</div>
          `;

          const item = {
            objectId: objectId,
            companyCode: companyCode,
            environmentCode: environmentCode,
            statusValue: statusValue,
            statusKey: statusKey,
            companyText: companyText,
            environmentText: environmentText,
            statusText: statusText,
            geometryTypeText: geometryTypeText,
            geometry: geom,
            center: center,
            layer: layer,
            rowEl: row,
            searchText: `${objectId} ${companyText} ${environmentText} ${statusText} ${geometryTypeText}`
          };

          row.onclick = function () {
            try {
              if (layer.getBounds && typeof layer.getBounds === "function") {
                const bounds = layer.getBounds();

                if (bounds && bounds.isValid && bounds.isValid()) {
                  map.fitBounds(bounds.pad(0.2));
                } else {
                  map.setView(center, 16);
                }
              } else {
                map.setView(center, 16);
              }
            } catch (err) {
              console.warn("Nepavyko fitBounds, naudojamas setView", err);
              map.setView(center, 16);
            }

            selectItem(item, center);
          };

          allItems.push(item);
          addedCount++;
        });

        console.log("Suvestinė:", {
          gautaIsServiso: data.features.length,
          prideta: addedCount,
          skippedExcludedStatus: skippedExcludedStatus,
          skippedNoGeometry: skippedNoGeometry,
          skippedNoLayer: skippedNoLayer,
          skippedNoCenter: skippedNoCenter
        });

        buildStatusFilters();
        applyFilter();

        if (featureLayer.getLayers().length) {
          const bounds = featureLayer.getBounds();

          if (bounds.isValid()) {
            map.fitBounds(bounds.pad(0.08));
          }
        }

        if (!allItems.length) {
          statusBar.textContent =
            "Servisas grąžino duomenis, bet po filtravimo nėra rodomų objektų";
        }
      } catch (e) {
        console.error("Bendra klaida loadData():", e);

        statusBar.textContent = "Klaida įkeliant duomenis";
        statusFilterList.textContent = "Klaida įkeliant statusus";
      }
    }

    filterInput.addEventListener("input", applyFilter);

    loadData();
  </script>
</body>
</html>
