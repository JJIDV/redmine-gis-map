<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <title>Projektai pagal įmones</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    #map {
      flex: 1;
      min-width: 0;
    }

    #sidebar {
      flex: 0 0 180px;
      max-width: 180px;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      font-size: 12px;
      background: #fff;
    }

    #sidebar-header {
      padding: 6px 8px;
      border-bottom: 1px solid #ddd;
      background: #f7f7f7;
      font-weight: 600;
      font-size: 12px;
      text-align: center;
    }

    #filter {
      padding: 4px 6px;
      border: none;
      border-bottom: 1px solid #ddd;
      outline: none;
      font-size: 12px;
      box-sizing: border-box;
      width: 100%;
    }

    #list {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
    }

    .feature-row {
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .feature-row:hover {
      background: #f0f8ff;
    }

    .feature-row.active {
      background: #e6f2ff;
    }

    .row-title {
      font-weight: 600;
      margin-bottom: 1px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-sub {
      color: #555;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-env {
      color: #777;
      font-size: 10px;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #status-bar {
      padding: 3px 6px;
      border-top: 1px solid #ddd;
      font-size: 10px;
      color: #555;
      background: #fafafa;
      text-align: center;
    }

    @media (max-width: 600px) {
      #sidebar {
        display: none;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="sidebar">
    <div id="sidebar-header">Projektai pagal įmones</div>
    <input id="filter" type="text" placeholder="Filtruoti pagal ID / įmonę..." />
    <div id="list"></div>
    <div id="status-bar">Kraunama...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ===== KONFIGŪRACIJA =====
  const arcgisLayerUrl =
    "https://zemelapiai.vplanas.lt/arcgis/rest/services/TESTAVIMAI/Uzduotys_PROJ_test/FeatureServer/3";

  // 1 = Testinė, 2 = Produkcinė
  const ENVIRONMENT_MODE = 1;

  const companyLookup = {
    0: "Nenurodyta",
    1: "VMSA",
    2: "SISP",
    3: "VVT",
    4: "Grinda",
    5: "Biseris",
    6: "Maniga",
    7: "Gatas"
  };

  const environmentLookup = {
    1: "Testinė",
    2: "Produkcinė"
  };

  const companyColors = {
    0: "#808080",
    1: "#1f78b4",
    2: "#33a02c",
    3: "#e31a1c",
    4: "#ff7f00",
    5: "#6a3d9a",
    6: "#b15928",
    7: "#17a2b8"
  };

  // ===== ŽEMĖLAPIS =====
  const map = L.map("map").setView([54.69, 25.28], 11);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap"
  }).addTo(map);

  const listEl = document.getElementById("list");
  const filterInput = document.getElementById("filter");
  const statusBar = document.getElementById("status-bar");

  let allItems = [];
  let featureLayer = L.featureGroup().addTo(map);

  function getCompanyText(code) {
    return companyLookup[code] || ("Įmonės kodas: " + code);
  }

  function getEnvironmentText(code) {
    return environmentLookup[code] || ("Aplinkos kodas: " + code);
  }

  function getCompanyColor(code) {
    return companyColors[code] || "#666666";
  }

  function createQueryUrl() {
    const params = new URLSearchParams({
      where: `Aplinka = ${ENVIRONMENT_MODE}`,
      outFields: "OBJECTID,Imone,Aplinka",
      returnGeometry: "true",
      f: "geojson"
    });

    return arcgisLayerUrl + "/query?" + params.toString();
  }

  function clearActiveRows() {
    document
      .querySelectorAll(".feature-row.active")
      .forEach((el) => el.classList.remove("active"));
  }

  function renderList(items) {
    listEl.innerHTML = "";
    items.forEach((item) => listEl.appendChild(item.rowEl));
    statusBar.textContent =
      "Rodomi " + items.length + " objektai (" + getEnvironmentText(ENVIRONMENT_MODE) + ")";
  }

  function applyFilter() {
    const textQuery = (filterInput.value || "").trim().toLowerCase();

    featureLayer.clearLayers();

    const filtered = allItems.filter((item) => {
      return !textQuery || (item.searchText || "").toLowerCase().includes(textQuery);
    });

    filtered.forEach((item) => item.layer.addTo(featureLayer));
    renderList(filtered);
  }

  if (filterInput) {
    filterInput.addEventListener("input", applyFilter);
  }

  async function loadData() {
    try {
      const resp = await fetch(createQueryUrl(), {
        cache: "no-store",
        mode: "cors"
      });

      const data = await resp.json();

      if (!data.features?.length) {
        statusBar.textContent = "Nerasta objektų";
        return;
      }

      const boundsCollector = [];

      data.features.forEach((feature) => {
        const props = feature.properties || {};
        const geometry = feature.geometry;

        if (!geometry) return;

        const objectId = props.OBJECTID;
        const companyCode = props.Imone;
        const environmentCode = props.Aplinka;

        const companyText = getCompanyText(companyCode);
        const environmentText = getEnvironmentText(environmentCode);
        const color = getCompanyColor(companyCode);

        const layer = L.geoJSON(feature, {
          style: {
            color,
            weight: 2,
            fillColor: color,
            fillOpacity: 0.25
          }
        });

        const bounds = layer.getBounds();
        if (!bounds.isValid()) return;

        const popupHtml = `
          <b>Objektas #${objectId}</b><br>
          Įmonė: ${companyText}<br>
          Aplinka: ${environmentText}
        `;

        layer.bindPopup(popupHtml);
        layer.addTo(featureLayer);
        boundsCollector.push(layer);

        const row = document.createElement("div");
        row.className = "feature-row";
        row.innerHTML = `
          <div class="row-title">Objektas #${objectId}</div>
          <div class="row-sub">${companyText}</div>
          <div class="row-env">Aplinka: ${environmentText}</div>
        `;

        row.onclick = () => {
          map.fitBounds(bounds.pad(0.2));
          layer.openPopup();
          clearActiveRows();
          row.classList.add("active");
        };

        layer.on("click", () => {
          row.scrollIntoView({ behavior: "smooth", block: "center" });
          clearActiveRows();
          row.classList.add("active");
        });

        const searchText = `${objectId} ${companyText} ${environmentText}`;

        allItems.push({
          layer,
          rowEl: row,
          searchText
        });
      });

      if (boundsCollector.length) {
        const g = L.featureGroup(boundsCollector);
        map.fitBounds(g.getBounds().pad(0.08));
      }

      renderList(allItems);
    } catch (e) {
      console.error(e);
      statusBar.textContent = "Klaida įkeliant duomenis";
    }
  }

  loadData();
</script>
</body>
</html>
