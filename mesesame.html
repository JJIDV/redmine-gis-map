<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Projektų objektai (multi-select)</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <style>
    html, body, #viewDiv { height: 100%; width: 100%; margin: 0; padding: 0; }
    #hint {
      position: absolute; z-index: 10; left: 12px; bottom: 12px;
      background: rgba(255,255,255,0.92); border: 1px solid #ddd;
      border-radius: 10px; padding: 10px 12px; font: 14px/1.3 system-ui, sans-serif;
      max-width: min(520px, calc(100% - 24px));
    }
    #hint code { background:#f5f5f5; padding:2px 6px; border-radius:6px; }
  </style>
</head>

<body>
  <div id="viewDiv"></div>
  <div id="hint">
    Naudojimas: <code>?ids=GUID1,GUID2,GUID3</code><br>
    Pvz: <code>?ids=2c4f...,923e...,174d...</code>
  </div>

  <script src="https://js.arcgis.com/4.29/"></script>
  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/FeatureLayer",
      "esri/geometry/Extent",
      "esri/geometry/support/webMercatorUtils"
    ], (Map, MapView, FeatureLayer, Extent, webMercatorUtils) => {

      // === 1) Tavo sluoksniai (FS1: 0 ir 1, FS2: 0) ===
      const LAYERS = [
        // FS1 (taškai / linijos) - čia padaryta kaip 0 ir 1 sluoksniai to paties FeatureServer
        { title: "FS1-0", url: "https://services1.arcgis.com/usA3lHW20rGU6glp/arcgis/rest/services/mesesame_pin_view/FeatureServer/0" },
        { title: "FS1-1", url: "https://services1.arcgis.com/usA3lHW20rGU6glp/arcgis/rest/services/mesesame_pin_view/FeatureServer/1" },

        // FS2
        { title: "FS2-0", url: "https://services1.arcgis.com/usA3lHW20rGU6glp/arcgis/rest/services/projektai_view/FeatureServer/0" }
      ];

      // === 2) GlobalID lauko pavadinimas (tu nurodei: GlobalID) ===
      const GLOBAL_ID_FIELD = "GlobalID";

      // === 3) Iš URL pasiimam kelis GUID ===
      const ids = parseIdsFromUrl();
      if (!ids.length) {
        console.warn("Nėra ids parametre. Pvz: ?ids=guid1,guid2");
      }

      // Paprastas saugiklis: tik GUID formatas
      const GUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      const cleanIds = ids.map(s => s.trim()).filter(s => GUID_RE.test(s));
      if (!cleanIds.length) {
        document.getElementById("hint").innerHTML =
          'Neradau tinkamų GUID. Naudok: <code>?ids=GUID1,GUID2</code>';
      }

      // === 4) Sukuriam sluoksnius ===
      const featureLayers = LAYERS.map(cfg => new FeatureLayer({
        url: cfg.url,
        title: cfg.title,
        outFields: [GLOBAL_ID_FIELD],
        // Jei norėsi užkrauti tik tuos objektus (filtruoti) – galima vėliau pridėti definitionExpression
      }));

      const map = new Map({
        basemap: "dark-gray-vector",
        layers: featureLayers
      });

      const view = new MapView({
        container: "viewDiv",
        map,
        center: [25.2798, 54.6872], // Vilnius default
        zoom: 12
      });

      let highlightHandles = [];

      view.when(async () => {
        if (!cleanIds.length) return;

        // 5) Užklausiam visus sluoksnius ir surenkam rastas geometrijas + objektus highlight’ui
        const found = await queryAllLayers(cleanIds);

        // 6) Priartinam į visų rastų objektų extent
        if (found.extent) {
          await view.goTo(found.extent.expand(1.35), { duration: 600 });
        }

        // 7) Highlightinam visus rastus objektus (per layerView)
        await highlightAll(found.byLayer);

        // 8) Informacinė žinutė
        const total = found.total;
        const hint = document.getElementById("hint");
        hint.innerHTML = total
          ? `Rasta objektų: <b>${total}</b><br>GUID kiekis URL: <b>${cleanIds.length}</b>`
          : `Nerasta objektų pagal nurodytus GUID.<br>Patikrink ar GUID tikrai egzistuoja sluoksniuose.`;
      });

      async function queryAllLayers(idList) {
        let combinedExtent = null;
        const byLayer = new Map(); // layer -> objectIds[]

        // Where: GlobalID IN ('a','b','c')
        const where = `${GLOBAL_ID_FIELD} IN (${idList.map(quoteSqlString).join(",")})`;

        for (const layer of featureLayers) {
          try {
            const q = layer.createQuery();
            q.where = where;
            q.returnGeometry = true;
            q.outFields = [GLOBAL_ID_FIELD];
            q.outSpatialReference = view.spatialReference;

            const res = await layer.queryFeatures(q);
            if (!res.features || !res.features.length) continue;

            // extent
            for (const f of res.features) {
              if (f.geometry && f.geometry.extent) {
                combinedExtent = combinedExtent ? combinedExtent.union(f.geometry.extent) : f.geometry.extent.clone();
              } else if (f.geometry && f.geometry.type === "point") {
                // point extent fallback
                const p = f.geometry;
                const e = new Extent({
                  xmin: p.x, ymin: p.y, xmax: p.x, ymax: p.y,
                  spatialReference: p.spatialReference
                });
                combinedExtent = combinedExtent ? combinedExtent.union(e) : e.clone();
              }
            }

            // objectIds highlight’ui (reikia objectIdFieldName)
            const oidField = layer.objectIdField;
            const oids = res.features
              .map(f => f.attributes && f.attributes[oidField])
              .filter(v => v !== null && v !== undefined);

            if (oids.length) byLayer.set(layer, oids);

          } catch (err) {
            console.warn("Query klaida sluoksnyje:", layer.title, err);
          }
        }

        let total = 0;
        for (const [, oids] of byLayer) total += oids.length;

        return { extent: combinedExtent, byLayer, total };
      }

      async function highlightAll(byLayerMap) {
        // nuimam senus highlight
        highlightHandles.forEach(h => { try { h.remove(); } catch(e) {} });
        highlightHandles = [];

        for (const [layer, oids] of byLayerMap) {
          const layerView = await view.whenLayerView(layer);
          const handle = layerView.highlight(oids);
          highlightHandles.push(handle);
        }
      }

      function parseIdsFromUrl() {
        const p = new URLSearchParams(location.search);
        const raw = (p.get("ids") || "").trim();
        if (!raw) return [];

        // leidžiam skyriklius: kablelis, tarpas, kabliataškis, nauja eilutė
        return raw.split(/[\s,;]+/).filter(Boolean);
      }

      function quoteSqlString(s) {
        // SQL string literal su pabėgimu nuo viengubų kabučių
        return "'" + String(s).replace(/'/g, "''") + "'";
      }
    });
  </script>
</body>
</html>
